<!DOCTYPE html>
<html>

<head>

<title>BioFetch v3</title>

<style>

body{
font-family:Arial;
max-width:1000px;
margin:auto;
padding:20px;
background:#f4f6f8;
}

h1{
text-align:center;
color:#2c3e50;
}

.card{

background:white;
padding:20px;
border-radius:12px;

}

input{

width:100%;
padding:12px;
font-size:16px;

}

button{

margin-top:10px;
padding:12px 20px;
background:#007bff;
color:white;
border:none;
cursor:pointer;

}


#result{

margin-top:20px;

}


.box{

background:#eee;
padding:10px;
border-radius:8px;

}


a{

padding:10px;
background:#28a745;
color:white;
text-decoration:none;

}

</style>


</head>


<body>


<h1>
BioFetch v3
</h1>


<div class="card">


<p>
Enter Protein ID OR Gene Name
</p>


<input id="query"
placeholder="Example: P69905 or TP53">


<button onclick="searchProtein()">

Search

</button>


<div id="result"></div>


</div>



<script>


async function searchProtein(){


let query =
document.getElementById("query").value;



let url;


// Detect ID or Gene


if(query.length <= 10 && query.match(/^[A-Z0-9]+$/)){


url =
"https://rest.uniprot.org/uniprotkb/"
+query+".json";


}

else{


url =
"https://rest.uniprot.org/uniprotkb/search?query=gene:"
+query+
"&format=json";

}




try{


let response =
await fetch(url);



let data =
await response.json();



let protein;



if(data.results){


protein=data.results[0];


}

else{


protein=data;


}




let accession =
protein.primaryAccession;



let name =
protein.proteinDescription
.recommendedName
.fullName
.value;



let organism =
protein.organism.scientificName;



let length =
protein.sequence.length;



document.getElementById("result").innerHTML =


`

<h2>${name}</h2>


<p>
<b>Accession:</b>
${accession}
</p>


<p>
<b>Organism:</b>
${organism}
</p>


<p>
<b>Length:</b>
${length}
</p>



<a target="_blank"

href="https://www.uniprot.org/uniprotkb/${accession}">

UniProt

</a>


<a target="_blank"

href="https://alphafold.ebi.ac.uk/entry/${accession}">

AlphaFold

</a>


<h3>
Sequence
</h3>


<div class="box">

${protein.sequence.value}

</div>


`;



}


catch{


document.getElementById("result").innerHTML=

"Not found";


}


}


</script>



</body>

</html>

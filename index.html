<!DOCTYPE html>
<html>

<head>

<title>BioFetch v3</title>

<style>

body{
font-family:Arial,sans-serif;
max-width:1000px;
margin:auto;
padding:20px;
background:#f4f6f8;
}


h1{
text-align:center;
color:#2c3e50;
}


.card{

background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);

}


input{

width:100%;
padding:12px;
font-size:16px;
margin-top:10px;

}


button{

margin-top:10px;
padding:12px 20px;
background:#007bff;
color:white;
border:none;
border-radius:6px;
cursor:pointer;

}


button:hover{

background:#0056b3;

}


#result{

margin-top:20px;

}


.box{

background:#eeeeee;
padding:15px;
border-radius:8px;
word-wrap:break-word;

}


a{

display:inline-block;
margin:10px 5px 10px 0;
padding:10px 15px;
background:#28a745;
color:white;
text-decoration:none;
border-radius:6px;

}


</style>


</head>


<body>


<h1>
BioFetch v3
</h1>


<div class="card">


<p>
Enter UniProt ID OR Gene Name
</p>


<input 
id="query"
placeholder="Example: P69905 or TP53">


<button onclick="searchProtein()">
Search
</button>


<div id="result"></div>


</div>



<script>


async function searchProtein(){


let query =
document.getElementById("query").value.trim();



if(query==""){

document.getElementById("result").innerHTML =
"Please enter a value";

return;

}



let url;



// UniProt ID detection

if(
query.match(/^([A-Z][0-9]{5}|[A-Z0-9]{6})$/)
){


url =
"https://rest.uniprot.org/uniprotkb/"
+query+
".json";


}


// Gene name search

else{


url =
"https://rest.uniprot.org/uniprotkb/search?query=gene:"
+query+
"&format=json";

}



try{


let response =
await fetch(url);



let data =
await response.json();



let protein;



// Gene search returns results array

if(data.results){


if(data.results.length===0){

throw "not found";

}


protein =
data.results[0];


}

else{


protein=data;

}




let accession =
protein.primaryAccession || "N/A";



let proteinName =
protein.proteinDescription
?.recommendedName
?.fullName
?.value
|| "N/A";



let organism =
protein.organism
?.scientificName
|| "N/A";



let length =
protein.sequence
?.length
|| "N/A";



let sequence =
protein.sequence
?.value
|| "N/A";



let gene =
protein.genes?.[0]?.geneName?.value
|| "N/A";



let functionText =
"N/A";



if(protein.comments){


let func =
protein.comments.find(
c=>c.commentType==="FUNCTION"
);



if(func){

functionText =
func.texts[0].value;

}

}





document.getElementById("result").innerHTML =


`

<h2>${proteinName}</h2>


<p>
<b>Accession:</b> ${accession}
</p>


<p>
<b>Gene:</b> ${gene}
</p>


<p>
<b>Organism:</b> ${organism}
</p>


<p>
<b>Length:</b> ${length}
</p>


<p>
<b>Function:</b><br>
${functionText}
</p>



<a target="_blank"
href="https://www.uniprot.org/uniprotkb/${accession}">
UniProt
</a>


<a target="_blank"
href="https://alphafold.ebi.ac.uk/entry/${accession}">
AlphaFold
</a>



<h3>
Protein Sequence
</h3>


<div class="box">

${sequence}

</div>


`;



}


catch{


document.getElementById("result").innerHTML =

"Protein or gene not found";


}



}



</script>


</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BioFetch Protein Explorer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f8fb;
    color:#16324f;
}

.header{
    background:linear-gradient(90deg,#06283d,#0b5c75);
    color:white;
    padding:28px;
    text-align:center;
}

.header h1{
    margin-bottom:8px;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:30px;
}

.search-box,
.result{
    background:white;
    padding:24px;
    border-radius:14px;
    box-shadow:0 4px 16px rgba(0,0,0,0.12);
    margin-bottom:25px;
}

.search-box h2{
    margin-bottom:10px;
    color:#063970;
}

.search-box p{
    margin-bottom:15px;
}

input{
    width:100%;
    padding:14px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:8px;
    margin-bottom:12px;
}

button{
    padding:12px 24px;
    background:#0077b6;
    color:white;
    border:none;
    cursor:pointer;
    border-radius:8px;
    font-weight:bold;
}

button:hover{
    background:#005f8f;
}

.info-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:18px;
    margin:20px 0;
}

.card{
    background:#eef6ff;
    padding:16px;
    border-radius:10px;
    border-left:5px solid #0077b6;
}

.card b{
    color:#063970;
}

.section{
    margin-top:22px;
}

.section h3{
    color:#063970;
    margin-bottom:10px;
}

.sequence{
    background:#fafafa;
    padding:16px;
    border:1px solid #ddd;
    border-radius:10px;
    overflow-x:auto;
    word-break:break-all;
    line-height:1.7;
    margin-top:12px;
    font-family:Consolas,monospace;
}

.links{
    margin-top:22px;
}

.links a{
    display:inline-block;
    margin:6px 8px 6px 0;
    padding:10px 14px;
    background:#0b3d5c;
    color:white;
    text-decoration:none;
    border-radius:7px;
    font-weight:bold;
}

.links a:hover{
    background:#06283d;
}

.back{
    display:inline-block;
    margin-top:10px;
    text-decoration:none;
    color:#0b3d5c;
    font-weight:bold;
}

.error{
    color:#b00020;
    font-weight:bold;
}

.loading{
    font-weight:bold;
    color:#0077b6;
}

@media(max-width:700px){
    .container{
        padding:18px;
    }
}
</style>
</head>

<body>

<div class="header">
    <h1>BioFetch Protein Explorer</h1>
    <p>Developed by Surendra Dutt Arya</p>
</div>

<div class="container">

    <div class="search-box">
        <h2>Search Protein</h2>
        <p>Enter UniProt accession or gene name. Examples: P04637, TP53, MYC, EGFR</p>

        <input id="query" placeholder="Enter protein accession or gene name">

        <button onclick="searchProtein()">Search</button>
    </div>

    <div id="result"></div>

    <a href="index.html" class="back">Back to Home</a>

</div>

<script>
async function searchProtein(){
    const q = document.getElementById("query").value.trim();
    const result = document.getElementById("result");

    if(q === ""){
        result.innerHTML = '<div class="result"><p class="error">Please enter a protein accession or gene name.</p></div>';
        return;
    }

    result.innerHTML = '<div class="result"><p class="loading">Searching protein data...</p></div>';

    try{
        let accession = q;
        const accessionPattern = /^[A-Z0-9]{6,10}$/i;

        if(!accessionPattern.test(q)){
            const searchQuery = encodeURIComponent("gene:" + q + " AND organism_id:9606 AND reviewed:true");
            const searchURL = "https://rest.uniprot.org/uniprotkb/search?query=" + searchQuery + "&format=json&size=1";

            const searchResponse = await fetch(searchURL);

            if(!searchResponse.ok){
                throw new Error("UniProt search failed");
            }

            const searchData = await searchResponse.json();

            if(!searchData.results || searchData.results.length === 0){
                result.innerHTML = '<div class="result"><h2>No protein found</h2><p>Try an accession like P04637 or another gene name.</p></div>';
                return;
            }

            accession = searchData.results[0].primaryAccession;
        }

        const proteinURL = "https://rest.uniprot.org/uniprotkb/" + accession + ".json";
        const response = await fetch(proteinURL);

        if(!response.ok){
            throw new Error("Protein record not found");
        }

        const data = await response.json();

        const accessionID = data.primaryAccession || accession;
        const proteinName =
            data.proteinDescription?.recommendedName?.fullName?.value ||
            data.proteinDescription?.submissionNames?.[0]?.fullName?.value ||
            "Unknown protein";

        const geneName =
            data.genes?.[0]?.geneName?.value ||
            "Not available";

        const organism =
            data.organism?.scientificName ||
            "Unknown";

        const commonName =
            data.organism?.commonName ||
            "Not available";

        const length =
            data.sequence?.length ||
            "Unknown";

        const mass =
            data.sequence?.molWeight ||
            "Unknown";

        const sequence =
            data.sequence?.value ||
            "Sequence not available";

        const functionText =
            data.comments?.find(c => c.commentType === "FUNCTION")?.texts?.[0]?.value ||
            "Function not available.";

        const locationComment =
            data.comments?.find(c => c.commentType === "SUBCELLULAR LOCATION");

        let location = "Not available";

        if(locationComment?.subcellularLocations?.length){
            location = locationComment.subcellularLocations
                .map(item => item.location?.value)
                .filter(Boolean)
                .join(", ");
        }

        const goTerms = (data.uniProtKBCrossReferences || [])
            .filter(ref => ref.database === "GO")
            .slice(0,10)
            .map(ref => {
                const term = ref.properties?.find(p => p.key === "GoTerm")?.value || ref.id;
                return "<li>" + escapeHTML(term) + "</li>";
            })
            .join("");

        const keywords = (data.keywords || [])
            .slice(0,12)
            .map(k => escapeHTML(k.name))
            .join(", ") || "Not available";

        result.innerHTML = `
            <div class="result">
                <h2>${escapeHTML(proteinName)}</h2>

                <div class="info-grid">
                    <div class="card">
                        <b>Accession</b><br>
                        ${escapeHTML(accessionID)}
                    </div>

                    <div class="card">
                        <b>Gene</b><br>
                        ${escapeHTML(geneName)}
                    </div>

                    <div class="card">
                        <b>Organism</b><br>
                        ${escapeHTML(organism)}
                    </div>

                    <div class="card">
                        <b>Common Name</b><br>
                        ${escapeHTML(commonName)}
                    </div>

                    <div class="card">
                        <b>Length</b><br>
                        ${escapeHTML(String(length))} aa
                    </div>

                    <div class="card">
                        <b>Molecular Weight</b><br>
                        ${escapeHTML(String(mass))} Da
                    </div>
                </div>

                <div class="section">
                    <h3>Function</h3>
                    <p>${escapeHTML(functionText)}</p>
                </div>

                <div class="section">
                    <h3>Subcellular Location</h3>
                    <p>${escapeHTML(location)}</p>
                </div>

                <div class="section">
                    <h3>Keywords</h3>
                    <p>${keywords}</p>
                </div>

                <div class="section">
                    <h3>GO Terms</h3>
                    <ul>${goTerms || "<li>Not available</li>"}</ul>
                </div>

                <div class="links">
                    <a target="_blank" href="https://www.uniprot.org/uniprotkb/${accessionID}">UniProt</a>
                    <a target="_blank" href="https://alphafold.ebi.ac.uk/entry/${accessionID}">AlphaFold</a>
                    <a target="_blank" href="https://rest.uniprot.org/uniprotkb/${accessionID}.fasta">Download FASTA</a>
                    <a target="_blank" href="https://www.ncbi.nlm.nih.gov/gene/?term=${encodeURIComponent(geneName)}">NCBI Gene</a>
                    <a target="_blank" href="https://www.kegg.jp/kegg-bin/search_pathway_text?keyword=${encodeURIComponent(geneName)}">KEGG</a>
                </div>

                <div class="section">
                    <h3>Protein Sequence</h3>
                    <button onclick="copySequence()">Copy Sequence</button>
                    <div class="sequence">${escapeHTML(sequence)}</div>
                </div>
            </div>
        `;
    }
    catch(error){
        result.innerHTML = `
            <div class="result">
                <h2 class="error">Error retrieving protein data</h2>
                <p>Please check the accession or gene name and try again.</p>
            </div>
        `;
    }
}

function copySequence(){
    const seqBox = document.querySelector(".sequence");

    if(!seqBox){
        alert("No sequence available to copy.");
        return;
    }

    navigator.clipboard.writeText(seqBox.innerText);
    alert("Sequence copied");
}

function escapeHTML(text){
    return String(text)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
}
</script>

</body>
</html>

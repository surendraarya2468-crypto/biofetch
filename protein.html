<!DOCTYPE html>
<html>

<head>

<title>BioFetch Protein Explorer</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial,sans-serif;
background:#f4f8fb;
margin:0;
}

.header{
background:#0b3d5c;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.search-box{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0px 2px 10px rgba(0,0,0,0.1);
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
font-size:16px;
margin-bottom:10px;
}

button{
padding:12px 25px;
background:#007bff;
color:white;
border:none;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#0056b3;
}

.result{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0px 2px 10px rgba(0,0,0,0.1);
}

.info-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
background:#eef6ff;
padding:15px;
border-radius:10px;
}

.sequence{
background:#fafafa;
padding:15px;
border:1px solid #ddd;
overflow-x:auto;
word-break:break-all;
margin-top:20px;
}

.links{
margin-top:20px;
}

.links a{
display:inline-block;
margin-right:15px;
padding:10px 15px;
background:#0b3d5c;
color:white;
text-decoration:none;
border-radius:5px;
}

.back{
display:inline-block;
margin-top:20px;
text-decoration:none;
color:#0b3d5c;
font-weight:bold;
}

</style>

</head>

<body>

<div class="header">

<h1>🧬 BioFetch Protein Explorer</h1>

<p>Developed by Surendra Dutt Arya</p>

</div>

<div class="container">

<div class="search-box">

<h2>Search Protein</h2>

<p>Enter UniProt Accession or Gene Name</p>

<input id="query" placeholder="Examples: P69905, TP53, MYC, EGFR">

<button onclick="searchProtein()">
Search
</button>

</div>

<div id="result"></div>

<a href="index.html" class="back">
⬅ Back to Home
</a>

</div>

<script>

async function searchProtein(){

let q=document.getElementById("query").value.trim();

let result=document.getElementById("result");

result.innerHTML="Searching...";

try{

let accession=q;

if(!q.match(/^[A-Z0-9]{6,10}$/i)){

let searchURL=
"https://rest.uniprot.org/uniprotkb/search?query=gene:"+q+"+AND+organism_id:9606&format=json&size=1";

let searchResponse=await fetch(searchURL);

let searchData=await searchResponse.json();

if(searchData.results.length===0){

result.innerHTML="<h2>No protein found</h2>";

return;

}

accession=searchData.results[0].primaryAccession;

}

let url=
"https://rest.uniprot.org/uniprotkb/"+accession+".json";

let response=await fetch(url);

let data=await response.json();

let proteinName=
data.proteinDescription?.recommendedName?.fullName?.value
|| "Unknown";

let geneName=
data.genes?.[0]?.geneName?.value
|| "Not available";

let functionText=
data.comments?.find(
c=>c.commentType==="FUNCTION"
)?.texts?.[0]?.value
|| "Function not available";

let organism=
data.organism?.scientificName
|| "Unknown";

let length=
data.sequence?.length
|| "Unknown";

let sequence=
data.sequence?.value
|| "";

let accessionID=
data.primaryAccession;

result.innerHTML=`

<div class="result">

<h2>${proteinName}</h2>

<div class="info-grid">

<div class="card">
<b>Accession</b><br>
${accessionID}
</div>

<div class="card">
<b>Gene</b><br>
${geneName}
</div>

<div class="card">
<b>Organism</b><br>
${organism}
</div>

<div class="card">
<b>Length</b><br>
${length} aa
</div>

</div>

<h3>Function</h3>

<p>${functionText}</p>

<div class="links">

<a target="_blank"
href="https://www.uniprot.org/uniprotkb/${accessionID}">
UniProt
</a>

<a target="_blank"
href="https://alphafold.ebi.ac.uk/entry/${accessionID}">
AlphaFold
</a>

</div>

<h3>Protein Sequence</h3>

<div class="sequence">

${sequence}

</div>

</div>

`;

}

catch(error){

result.innerHTML="<h2>Protein not found</h2>";

}

}

<script>

async function searchProtein(){

let q=document.getElementById("query").value.trim();

let result=document.getElementById("result");

result.innerHTML="Searching...";

try{

let accession=q;

if(!q.match(/^[A-Z0-9]{6,10}$/i)){

let searchURL=
"https://rest.uniprot.org/uniprotkb/search?query=gene:"+q+
"+AND+reviewed:true+AND+organism_id:9606&format=json&size=1";

let searchResponse=await fetch(searchURL);

let searchData=await searchResponse.json();

if(searchData.results.length===0){

result.innerHTML="<h2>No protein found</h2>";

return;

}

accession=searchData.results[0].primaryAccession;

}

let url=
"https://rest.uniprot.org/uniprotkb/"+accession+".json";

let response=await fetch(url);

let data=await response.json();

let proteinName=
data.proteinDescription?.recommendedName?.fullName?.value
|| "Unknown";

let geneName=
data.genes?.[0]?.geneName?.value
|| "Not available";

let functionText=
data.comments?.find(
c=>c.commentType==="FUNCTION"
)?.texts?.[0]?.value
|| "Function not available";

let organism=
data.organism?.scientificName
|| "Unknown";

let length=
data.sequence?.length
|| "Unknown";

let mass=
data.sequence?.molWeight
|| "Unknown";

let sequence=
data.sequence?.value
|| "";

let accessionID=
data.primaryAccession;

result.innerHTML=`

<div class="result">

<h2>${proteinName}</h2>

<div class="info-grid">

<div class="card">
<b>Accession</b><br>
${accessionID}
</div>

<div class="card">
<b>Gene</b><br>
${geneName}
</div>

<div class="card">
<b>Organism</b><br>
${organism}
</div>

<div class="card">
<b>Length</b><br>
${length} aa
</div>

<div class="card">
<b>Molecular Weight</b><br>
${mass} Da
</div>

</div>

<h3>Function</h3>

<p>${functionText}</p>

<div class="links">

<a target="_blank"
href="https://www.uniprot.org/uniprotkb/${accessionID}">
UniProt
</a>

<a target="_blank"
href="https://alphafold.ebi.ac.uk/entry/${accessionID}">
AlphaFold
</a>

<a target="_blank"
href="https://rest.uniprot.org/uniprotkb/${accessionID}.fasta">
Download FASTA
</a>

<a target="_blank"
href="https://www.ncbi.nlm.nih.gov/gene/?term=${geneName}">
NCBI Gene
</a>

<a target="_blank"
href="https://www.kegg.jp/kegg-bin/search_pathway_text?keyword=${geneName}">
KEGG
</a>

</div>

<h3>Protein Sequence</h3>

<button onclick="copySequence()">
Copy Sequence
</button>

<div class="sequence">
${sequence}
</div>

</div>

`;

}

catch(error){

result.innerHTML="<h2>Protein not found</h2>";

}

}

function copySequence(){

let seq=document.querySelector(".sequence").innerText;

navigator.clipboard.writeText(seq);

alert("Sequence copied");

}

</script>

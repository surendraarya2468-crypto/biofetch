<script>

async function searchProtein(){

let q=document.getElementById("query").value.trim();

let result=document.getElementById("result");

result.innerHTML="Searching...";

try{

let response=await fetch(
"https://rest.uniprot.org/uniprotkb/P04637.json"
);

let data=await response.json();

result.innerHTML=`
<h2>${data.proteinDescription.recommendedName.fullName.value}</h2>
<p>Gene: TP53</p>
<p>Accession: ${data.primaryAccession}</p>
`;

}

catch(error){

result.innerHTML=
"<h2>Error connecting to UniProt API</h2>";

console.error(error);

}

}

</script>

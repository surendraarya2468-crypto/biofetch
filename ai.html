<!DOCTYPE html>
<html>

<head>

<title>BioFetch AI Assistant</title>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

body{
font-family:Arial;
background:#eef6ff;
margin:0;
}

.header{
background:#063970;
color:white;
padding:25px;
text-align:center;
}

.container{

max-width:900px;
margin:40px auto;
background:white;
padding:30px;
border-radius:15px;

}

textarea{

width:100%;
height:120px;
padding:15px;
font-size:16px;

}


button{

margin-top:15px;
padding:12px 25px;
background:#0077cc;
color:white;
border:none;
border-radius:8px;
cursor:pointer;

}


#answer{

margin-top:20px;
background:#f5f5f5;
padding:20px;
border-radius:10px;
white-space:pre-wrap;

}


</style>

</head>


<body>


<div class="header">

<h1>🧬 BioFetch AI Assistant</h1>

<p>Bioinformatics Research Assistant</p>

</div>



<div class="container">


<textarea id="question"
placeholder="Ask about proteins, genes, pathways, microbes...">
</textarea>


<br>


<button onclick="askAI()">

Ask AI

</button>



<div id="answer">

AI response will appear here...

</div>



</div>



<script>


async function askAI(){


let question =
document.getElementById("question").value;



document.getElementById("answer").innerHTML =
"🧬 Searching BioFetch AI...";



try{


let response = await fetch("/api/chat",{


method:"POST",


headers:{


"Content-Type":"application/json"


},


body:JSON.stringify({


question:question


})


});



let data = await response.json();



document.getElementById("answer").innerHTML =
data.answer;


}


catch(error){


document.getElementById("answer").innerHTML =
"Error connecting to AI";


console.log(error);


}


}


</script>



</body>

</html>
